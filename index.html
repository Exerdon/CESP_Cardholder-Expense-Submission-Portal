<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cardholder Expense Submission Portal</title>

   <link rel="stylesheet" type="text/css" href="style.css">


</head>

<body>

<div class="container">

  <div class="header">

    <h1>Cardholder Expense Submission Portal</h1>

    <p>
      Submit expense allocations and receipts.
    </p>

  </div>

  <form id="expenseForm">

    <div class="section-title">
      Cardholder Information
    </div>

    <div class="grid">

      <div class="field">

        <label>Cardholder Name</label>

        <input
          type="text"
          id="cardholderName"
          list="cardholderSuggestions"
          placeholder="Type or select cardholder"
          required
        />

        <datalist id="cardholderSuggestions">

          <option value="JEFFREY MARX">
          <option value="DAWN CUPRYS">
          <option value="AMY WILSON">


        </datalist>

      </div>

      <div class="field">

        <label>Submission Timestamp</label>

        <input
          type="date"
          id="currentDate"
          class="readonly"
          readonly
        />

      </div>

      <div class="field">

        <label>Total Amount Spent</label>

        <input
          type="text"
          id="totalAmount"
          class="readonly"
          readonly
          value="0.00"
        />

      </div>

    </div>

    <div class="section-title">
      Expense Entries
    </div>

    <table id="expenseTable">

      <thead>

        <tr>

          <th>Date of Expense</th>

          <th>Property</th>

          <th>Ownership</th>

          <th class="amount-column">Amount</th>

          <th>Lot</th>

          <th>Expense Type</th>

          <th>Expense Description</th>

          <th class="file-column">
            Receipt Upload
          </th>

        </tr>

      </thead>

      <tbody>

        <tr>

          <td>
            <input type="date" class="expense-date" />
          </td>

          <td>
            <textarea
              rows="3"
              placeholder="Property"
            ></textarea>
          </td>

          <td>
            <textarea
              rows="3"
              placeholder="Ownership"
            ></textarea>
          </td>

          <td>
            <input
              type="number"
              step="0.01"
              class="amount-input"
              placeholder="Amount"
            />
          </td>

          <td>
            <textarea
              rows="3"
              placeholder="Lot"
            ></textarea>
          </td>

          <td>
            <textarea
              rows="3"
              placeholder="Expense Type"
            ></textarea>
          </td>

          <td>
            <textarea
              rows="3"
              placeholder="Expense Description"
            ></textarea>
          </td>

          <td>
            <input
              type="file"
              class="receipt-file"
              mULTIPLE
            />
          </td>

        </tr>

      </tbody>

    </table>

    <button
      type="button"
      class="add-btn"
      onclick="addExpenseRow()"
    >
      + Add Expense Row
    </button>

    <button
      type="submit"
      class="submit-btn"
    >
      Submit Expense Report
    </button>

  </form>

</div>

<script src="functions.js"></script>

</body>

</html>
